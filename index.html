<style>
  :root{
    --bg:#FAF6EF; --surface:#FFFFFF; --surface-2:#F4EEE3; --surface-3:#EFE7D8;

    --line:#E6DECF;
    --accent:#DD6A2C; --accent-ink:#FFFFFF;
    --vegan:#2F7D42; --vegan-bg:#E6F1E4; --vegan-line:#BCD9BC;
    --navy:#1E2A44;

    --d1:#DD6A2C; --d2:#128C8A; --d3:#7A5CC0; --d4:#CE4235;
    --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#101219; --surface:#191C25; --surface-2:#20242E; --surface-3:#272C37;
      --ink:#ECE7DD; --ink-2:#9AA0AC; --ink-3:#6E747F;
      --line:#2A2F3A;
      --accent:#EE824C; --accent-ink:#1B1205;
      --vegan:#7FC48D; --vegan-bg:#1B2A20; --vegan-line:#2E4633;
      --navy:#B9C4DC;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 26px rgba(0,0,0,.36);
      --d1:#EE824C; --d2:#3BB6B0; --d3:#9E86D8; --d4:#E4645A;
    }
  }
  :root[data-theme="light"]{
    --bg:#FAF6EF; --surface:#FFFFFF; --surface-2:#F4EEE3; --surface-3:#EFE7D8;
    --ink:#1B1E27; --ink-2:#5C616D; --ink-3:#8A8F9B; --line:#E6DECF;
    --accent:#DD6A2C; --accent-ink:#FFFFFF;
    --vegan:#2F7D42; --vegan-bg:#E6F1E4; --vegan-line:#BCD9BC; --navy:#1E2A44;
    --shadow:0 1px 2px rgba(30,25,15,.05), 0 6px 22px rgba(30,25,15,.06);
    --d1:#DD6A2C; --d2:#128C8A; --d3:#7A5CC0; --d4:#CE4235;
  }
  :root[data-theme="dark"]{
    --bg:#101219; --surface:#191C25; --surface-2:#20242E; --surface-3:#272C37;
    --ink:#ECE7DD; --ink-2:#9AA0AC; --ink-3:#6E747F; --line:#2A2F3A;
    --accent:#EE824C; --accent-ink:#1B1205;
    --vegan:#7FC48D; --vegan-bg:#1B2A20; --vegan-line:#2E4633; --navy:#B9C4DC;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 26px rgba(0,0,0,.36);
    --d1:#EE824C; --d2:#3BB6B0; --d3:#9E86D8; --d4:#E4645A;
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5;
    padding-bottom:calc(2rem + env(safe-area-inset-bottom));}
  .wrap{max-width:640px;margin:0 auto;}

  /* App bar */
  .bar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:saturate(1.4) blur(10px);-webkit-backdrop-filter:saturate(1.4) blur(10px);
    border-bottom:1px solid var(--line);}
  .bar-in{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;
    gap:.75rem;padding:.7rem 1rem .55rem;}
  .brand{display:flex;align-items:baseline;gap:.5rem;font-weight:800;letter-spacing:.02em;
    font-size:1.28rem;}
  .brand .dot{width:.52rem;height:.52rem;border-radius:50%;background:var(--accent);
    display:inline-block;transform:translateY(-.05em);}
  .brand small{font:600 .62rem/1 var(--mono);letter-spacing:.14em;color:var(--ink-2);
    text-transform:uppercase;}
  .veg-tag{font:700 .6rem/1 var(--mono);letter-spacing:.1em;color:var(--vegan);
    background:var(--vegan-bg);border:1px solid var(--vegan-line);
    padding:.34rem .5rem;border-radius:999px;white-space:nowrap;text-transform:uppercase;}

  /* Day tabs */
  .tabs{display:flex;gap:.4rem;overflow-x:auto;padding:.55rem 1rem;scrollbar-width:none;
    -webkit-overflow-scrolling:touch;}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);border-radius:.7rem;
    padding:.4rem .62rem;cursor:pointer;color:var(--ink-2);min-width:3.5rem;text-align:center;
    transition:transform .12s ease,border-color .12s ease;font-family:inherit;}
  .tab:active{transform:scale(.96)}
  .tab .dow{display:block;font:700 .62rem/1.2 var(--mono);letter-spacing:.08em;text-transform:uppercase;}
  .tab .dnum{display:block;font-weight:800;font-size:1.12rem;color:var(--ink);margin-top:.1rem;
    font-variant-numeric:tabular-nums;}
  .tab[aria-selected="true"]{border-color:var(--tc);background:color-mix(in srgb,var(--tc) 12%,var(--surface));}
  .tab[aria-selected="true"] .dnum{color:var(--tc)}
  .tab .tline{height:3px;border-radius:2px;margin-top:.4rem;background:var(--tc);opacity:.85;}
  .tab[aria-selected="false"] .tline{opacity:.18}
  .tab.info .dnum{font-size:.95rem;letter-spacing:.02em;padding:.13rem 0}

  /* Panels */
  .panel{display:none;padding:1rem 1rem 0}
  .panel.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.panel.on{animation:none}.tab:active{transform:none}}

  /* Day header */
  .dhead{background:var(--surface);border:1px solid var(--line);border-radius:1rem;
    padding:1rem 1.05rem;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .dhead::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--day);}
  .dhead .kick{font:700 .66rem/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;
    color:var(--day);}
  .dhead h2{margin:.45rem 0 .3rem;font-size:1.32rem;line-height:1.18;letter-spacing:-.01em;
    text-wrap:balance;font-weight:800;}
  .dhead p{margin:0;color:var(--ink-2);font-size:.92rem;}
  .hoods{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.7rem}
  .hood{font:600 .68rem/1 var(--mono);letter-spacing:.04em;color:var(--ink-2);
    background:var(--surface-2);border:1px solid var(--line);padding:.34rem .5rem;border-radius:.5rem;}

  /* Timeline */
  .tl{position:relative;margin-top:1rem}
  .it{position:relative;padding:0 0 1.15rem 4.35rem;}
  .it .time{position:absolute;left:0;top:.05rem;width:2.7rem;text-align:right;
    font:600 .78rem/1.3 var(--mono);color:var(--ink-2);font-variant-numeric:tabular-nums;}
  .it::before{content:"";position:absolute;left:3.16rem;top:.2rem;width:.72rem;height:.72rem;
    border-radius:50%;background:var(--surface);border:2.5px solid var(--day);z-index:1;}
  .it::after{content:"";position:absolute;left:calc(3.16rem + .29rem);top:.7rem;bottom:-.15rem;
    width:2px;background:var(--day);opacity:.28;}
  .it:last-child::after{display:none}
  .it.meal::before{background:var(--day);}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:.85rem;
    padding:.8rem .85rem;box-shadow:var(--shadow);}
  .card.plain{background:transparent;border:none;box-shadow:none;padding:.1rem 0}
  .card.plain .ct{font-size:.98rem}
  .ct{font-weight:700;font-size:1.02rem;line-height:1.25;letter-spacing:-.01em;}
  .csub{color:var(--ink-2);font-size:.9rem;margin-top:.25rem}
  .badges{display:flex;flex-wrap:wrap;gap:.35rem;margin:.5rem 0 .1rem}
  .b{font:700 .62rem/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;
    padding:.32rem .46rem;border-radius:.45rem;white-space:nowrap;}
  .b.veg{color:var(--vegan);background:var(--vegan-bg);border:1px solid var(--vegan-line);}
  .b.ok{color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);}
  .b.free{color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,var(--surface));
    border:1px solid color-mix(in srgb,var(--accent) 30%,var(--line));}
  .meta{display:flex;flex-wrap:wrap;gap:.15rem .7rem;margin-top:.5rem;font-size:.84rem;color:var(--ink-2)}
  .meta span{display:inline-flex;align-items:center;gap:.3rem}
  .meta .lbl{font:700 .6rem/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
  .addr{font:500 .8rem/1.35 var(--mono);color:var(--ink-2);margin-top:.45rem;}

  .actions{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.7rem}
  a.btn{display:inline-flex;align-items:center;gap:.35rem;text-decoration:none;
    font:700 .78rem/1 var(--sans);letter-spacing:.01em;padding:.5rem .7rem;border-radius:.55rem;
    border:1px solid var(--line);color:var(--ink);background:var(--surface-2);
    transition:transform .1s ease;}
  a.btn:active{transform:scale(.97)}
  a.btn .ic{font:700 .8rem/1 var(--mono);color:var(--accent)}
  a.btn.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  a.btn.primary .ic{color:var(--accent-ink)}
  a.btn:focus-visible,.tab:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}

  .callout{margin-top:.6rem;background:color-mix(in srgb,var(--accent) 9%,var(--surface));
    border:1px solid color-mix(in srgb,var(--accent) 28%,var(--line));border-radius:.6rem;
    padding:.6rem .7rem;font-size:.84rem;color:var(--ink);}
  .callout b{color:var(--accent);font:800 .64rem/1 var(--mono);letter-spacing:.1em;
    text-transform:uppercase;display:block;margin-bottom:.25rem}

  /* Info panel */
  .isec{background:var(--surface);border:1px solid var(--line);border-radius:1rem;
    padding:1rem 1.05rem;box-shadow:var(--shadow);margin-bottom:.9rem;}
  .isec h3{margin:0 0 .2rem;font-size:1.05rem;letter-spacing:-.01em;font-weight:800}
  .isec h3 .k{font:700 .6rem/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);display:block;margin-bottom:.35rem}
  .irow{padding:.7rem 0;border-top:1px solid var(--line);font-size:.9rem;color:var(--ink-2)}
  .irow:first-of-type{border-top:none}
  .irow b{color:var(--ink);font-weight:700}
  .irow .sub{display:block;margin-top:.15rem}
  .rest{display:flex;justify-content:space-between;gap:.6rem;align-items:baseline}
  .rest .rn{color:var(--ink);font-weight:700;font-size:.95rem}
  .rest .ra{font:500 .74rem/1.3 var(--mono);color:var(--ink-3);text-align:right;flex:0 0 auto;max-width:48%}
  .note{font-size:.82rem;color:var(--ink-3);padding:.2rem 1rem 0;text-align:center;line-height:1.5}
  .hr-note{text-align:center;color:var(--ink-3);font:600 .7rem/1.4 var(--mono);
    letter-spacing:.04em;padding:1.4rem 1rem .4rem}
  .foot{padding:1.6rem 1.2rem 0;color:var(--ink-3);font-size:.78rem;text-align:center;line-height:1.6}
</style>

function badgeRow(it){
  let b="";
  if(it.veg){ const opt=/opci/i.test(it.veg); b+=`<span class="b veg">${opt?"◐":"✓"} ${it.veg}</span>`; }
  if(it.verified) b+=`<span class="b ok">✓ Verificado</span>`;
  if(it.free) b+=`<span class="b free">Gratis</span>`;
  return b?`<div class="badges">${b}</div>`:"";
}
function metaRow(it){
  const p=[];
  if(it.cuisine) p.push(`<span><span class="lbl">Tipo</span> ${it.cuisine}</span>`);
  if(it.hours) p.push(`<span><span class="lbl">Horario</span> ${it.hours}</span>`);
  return p.length?`<div class="meta">${p.join("")}</div>`:"";
}
function actions(it){
  let a="";
  if(it.book) a+=`<a class="btn primary" href="${it.book}" target="_blank" rel="noopener"><span class="ic">↗</span>${it.bookLabel||"Reservar"}</a>`;
  if(it.map) a+=`<a class="btn" href="${map(it.map)}" target="_blank" rel="noopener"><span class="ic">◎</span>Mapa</a>`;
  return a?`<div class="actions">${a}</div>`:"";
}
function itemHTML(it){
  const meal = it.kind==="meal";
  const plain = it.kind!=="meal" && !it.callout && !it.map && !it.book;
  const inner = `
    <div class="ct">${it.title}</div>
    ${badgeRow(it)}
    ${it.sub?`<div class="csub">${it.sub}</div>`:""}
    ${metaRow(it)}
    ${it.addr?`<div class="addr">${it.addr}</div>`:""}
    ${it.callout?`<div class="callout"><b>${it.callout.t}</b>${it.callout.d}</div>`:""}
    ${actions(it)}`;
  return `<div class="it ${meal?"meal":""}">
      <div class="time">${it.time}</div>
      <div class="card ${plain?"plain":""}">${inner}</div>
    </div>`;
}

const tabsEl=document.getElementById("tabs");
const panelsEl=document.getElementById("panels");

days.forEach((d,i)=>{
  const t=document.createElement("button");
  t.className="tab"; t.setAttribute("role","tab");
  t.setAttribute("aria-selected", i===0?"true":"false");
  t.setAttribute("aria-controls","p"+i);
  t.style.setProperty("--tc",`var(${d.color})`);
  t.innerHTML=`<span class="dow">${d.dow}</span><span class="dnum">${d.num}</span><span class="tline"></span>`;
  t.addEventListener("click",()=>select(i));
  tabsEl.appendChild(t);

  const p=document.createElement("section");
  p.className="panel"+(i===0?" on":""); p.id="p"+i; p.setAttribute("role","tabpanel");
  p.style.setProperty("--day",`var(${d.color})`);
  p.innerHTML=`
    <div class="dhead">
      <div class="kick">${d.kick}</div>
      <h2>${d.title}</h2>
      <p>${d.summary}</p>
      <div class="hoods">${d.hoods.map(h=>`<span class="hood">${h}</span>`).join("")}</div>
    </div>
    <div class="tl">${d.items.map(itemHTML).join("")}</div>`;
  panelsEl.appendChild(p);
});

const tabs=[...tabsEl.querySelectorAll(".tab")];
const panels=[...panelsEl.querySelectorAll(".panel")];
function select(i){
  tabs.forEach((t,k)=>t.setAttribute("aria-selected", k===i?"true":"false"));
  panels.forEach((p,k)=>p.classList.toggle("on", k===i));
  window.scrollTo({top:0,behavior:"smooth"});
}
